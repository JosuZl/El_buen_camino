<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Buen Camino - Josué Zamora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">
    <div id="app" class="max-w-6xl mx-auto"></div>

    <script>
        const stages = [
            { title: "Integridad y Carácter", duration: 21, color: "bg-emerald-500", light: "bg-emerald-50", text: "text-emerald-700", border: "border-emerald-500", daily: {
                1: { read: "Art. 'Integridad vs Reputación'", task: "Define tu 'yo privado' vs 'yo público'", social: "Post: ¿Quién soy cuando nadie me mira?", question: "¿Qué área de mi vida temo que la gente descubra?" },
                2: { read: "Salmo 139: Examen profundo", task: "Lista tus 3 debilidades mayores", social: "Story: La vulnerabilidad", question: "¿He pedido perdón hoy?" }
            }},
            { title: "Sana Doctrina", duration: 30, color: "bg-blue-500", light: "bg-blue-50", text: "text-blue-700", border: "border-blue-500", daily: {
                22: { read: "9 Marcas: Predicación Expositiva", task: "Busca un sermón expositivo", social: "Video: Biblia en el púlpito", question: "¿Confío en el texto bíblico?" }
            }}
            // ... Se pueden seguir sumando los 114 días aquí
        ];

        let selectedDay = 1;

        function getDayData(absDay) {
            let dayInStage = absDay;
            let currentStageIdx = 0;
            for (let i = 0; i < stages.length; i++) {
                if (dayInStage <= stages[i].duration) {
                    currentStageIdx = i;
                    break;
                }
                dayInStage -= stages[i].duration;
            }
            const stage = stages[currentStageIdx];
            const specific = stage.daily[absDay] || { read: "Estudio Profundo", task: "Repaso del bloque", social: "Reflexión del día", question: "¿Cómo aplico esto hoy?" };
            return { ...specific, ...stage, dayInStage, stageIdx: currentStageIdx };
        }

        function render() {
            const data = getDayData(selectedDay);
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div class="lg:col-span-5 space-y-6">
                        <div class="bg-white rounded-[2rem] p-6 shadow-xl border border-white">
                            <div class="flex justify-between items-center mb-6">
                                <h2 class="font-black text-slate-800">RUTA DE APRENDIZAJE</h2>
                                <span class="bg-slate-100 px-3 py-1 rounded-full text-xs font-bold">DÍA ${selectedDay} / 114</span>
                            </div>
                            <div class="grid grid-cols-7 gap-2">
                                ${Array.from({length: data.duration}).map((_, i) => {
                                    const dayNum = (selectedDay - data.dayInStage + 1) + i;
                                    return `<button onclick="setDay(${dayNum})" class="aspect-square rounded-xl text-xs font-bold ${dayNum === selectedDay ? data.color + ' text-white' : 'bg-slate-50 text-slate-400'}">${i+1}</button>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-7 space-y-6">
                        <div class="bg-white rounded-[2rem] p-8 shadow-xl">
                            <h4 class="${data.text} text-xs font-black uppercase tracking-widest mb-2">${data.title}</h4>
                            <h1 class="text-3xl font-black text-slate-900 mb-8">Misión del Día</h1>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                                    <i data-lucide="book-open" class="text-indigo-500 mb-2"></i>
                                    <h5 class="font-black text-xs text-slate-400 mb-1">LECTURA</h5>
                                    <p class="font-bold text-slate-700">${data.read}</p>
                                </div>
                                <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                                    <i data-lucide="camera" class="text-pink-500 mb-2"></i>
                                    <h5 class="font-black text-xs text-slate-400 mb-1">BITÁCORA</h5>
                                    <p class="font-bold text-slate-700">${data.social}</p>
                                </div>
                            </div>

                            <div class="mt-8 flex gap-4">
                                <button onclick="changeDay(-1)" class="flex-1 py-4 bg-slate-100 rounded-2xl font-black text-slate-500 hover:bg-slate-200 transition">ANTERIOR</button>
                                <button onclick="changeDay(1)" class="flex-1 py-4 ${data.color} text-white rounded-2xl font-black shadow-lg shadow-current/30 hover:scale-105 transition">SIGUIENTE</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        window.setDay = (d) => { selectedDay = d; render(); };
        window.changeDay = (n) => { selectedDay = Math.max(1, Math.min(114, selectedDay + n)); render(); };

        render();
    </script>
</body>
</html>
