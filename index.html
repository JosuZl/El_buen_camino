<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Buen Camino | Josué Zamora</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script>
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
          }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script>
        // BASE DE DATOS COMPLETA DE LAS ETAPAS
        const stages = [
            {
                title: "Integridad y Carácter",
                duration: 21,
                color: "bg-emerald-500",
                lightColor: "bg-emerald-50",
                textColor: "text-emerald-700",
                border: "border-emerald-500",
                daily: {
                    1: { read: "Art. 'Integridad vs Reputación' (M. Haurich)", task: "Define tu 'yo privado' vs 'yo público'", social: "Post: ¿Quién soy cuando nadie me mira?", question: "¿Qué área de mi vida temo que la gente descubra?" },
                    2: { read: "Salmo 139: Examen profundo", task: "Haz una lista de tus 3 debilidades mayores", social: "Story: La vulnerabilidad en el liderazgo", question: "¿He pedido perdón a alguien hoy por falta de coherencia?" },
                    3: { read: "Libro Swindoll: 'José', Cap 1", task: "Identifica tus 'Pozos' actuales", social: "Video: Los procesos silenciosos de Dios", question: "¿Estoy dispuesto a esperar el tiempo de Dios sin forzar puertas?" },
                    4: { read: "Manual Liderazgo: 'Liderazgo de Siervo'", task: "Sirve en una tarea oculta en tu casa/iglesia", social: "Post: El poder del delantal vs el poder del púlpito", question: "¿Me molesta que no reconozcan mi servicio?" },
                    5: { read: "Gálatas 5:22-26 (El Fruto)", task: "Evalúa tu paciencia hoy ante el estrés", social: "Reel: El fruto no se fabrica, se cultiva", question: "¿Qué aspecto del fruto del Espíritu estuvo ausente hoy?" },
                    6: { read: "Art. 'Autoliderazgo' (P. Hernández)", task: "Escribe tu Misión Personal", social: "Post: Mi brújula para este 2026", question: "¿Mis acciones de hoy me acercaron a mi misión?" },
                    7: { read: "1 Timoteo 3: Requisitos del Obispo", task: "Contrasta tu vida con los requisitos de Pablo", social: "Story: El estándar no es el éxito, es la fidelidad", question: "¿Cumplo con ser 'irreprensible' en mi hogar?" },
                    21: { read: "Repaso: El Círculo de Rendición de Cuentas", task: "Reúnete con un mentor real", social: "Post: Final de etapa. Lecciones de integridad", question: "¿Tengo a alguien a quien le confieso todo?" }
                }
            },
            {
                title: "Sana Doctrina",
                duration: 30,
                color: "bg-blue-500",
                lightColor: "bg-blue-50",
                textColor: "text-blue-700",
                border: "border-blue-500",
                daily: {
                    22: { read: "9 Marcas (Dever): Marca 1 - Predicación Expositiva", task: "Busca un sermón expositivo y analízalo", social: "Video: ¿Por qué la Biblia debe mandar en el púlpito?", question: "¿Confío más en mis ideas o en el texto bíblico?" },
                    23: { read: "9 Marcas: Marca 2 - Teología Bíblica", task: "Explica qué es la 'Teología Bíblica' en 2 min", social: "Story: La Biblia no es una enciclopedia, es una historia", question: "¿Veo a Cristo en toda la Escritura?" },
                    24: { read: "Libro Berkhof: Cap. Atributos de Dios", task: "Lista 5 atributos incomunicables de Dios", social: "Post: Dios es Dios y yo no lo soy", question: "¿Mi oración de hoy reconoció la soberanía de Dios?" },
                    25: { read: "Art. 'Sana Doctrina' (Melvin Zelaya)", task: "Define 'Inerrancia' con tus palabras", social: "Post: ¿Es la Biblia realmente confiable?", question: "¿Dudo de la veracidad de algún pasaje?" }
                }
            },
            {
                title: "Exégesis Bíblica",
                duration: 21,
                color: "bg-purple-500",
                lightColor: "bg-purple-50",
                textColor: "text-purple-700",
                border: "border-purple-500",
                daily: {
                    52: { read: "Gordon Fee: Paso 1 - El Contexto Histórico", task: "Elige una perícopa (p.ej. Filp 2:5-11)", social: "Story: Viajando al primer siglo", question: "¿Qué pasaba en Filipos cuando Pablo escribió esto?" }
                }
            },
            {
                title: "Homilética y Oratoria",
                duration: 21,
                color: "bg-orange-500",
                lightColor: "bg-orange-50",
                textColor: "text-orange-700",
                border: "border-orange-500",
                daily: {
                    73: { read: "Manual Homilética: El Bosquejo Textual", task: "Crea un bosquejo de 3 puntos", social: "Post: Estructurando el mensaje", question: "¿Los puntos fluyen del texto?" }
                }
            },
            {
                title: "Consejería Pastoral",
                duration: 21,
                color: "bg-rose-500",
                lightColor: "bg-rose-50",
                textColor: "text-rose-700",
                border: "border-rose-500",
                daily: {
                    94: { read: "Manual Muñoz-Suárez: Fundamentos", task: "Define rol de consejero", social: "Post: Necesidad de consejería", question: "¿Busco aliviar síntomas o transformar el corazón?" }
                }
            }
        ];

        let selectedDay = 1;

        function getDayData(absDay) {
            let dayInStage = absDay;
            let currentStageIdx = 0;
            for (let i = 0; i < stages.length; i++) {
                if (dayInStage <= stages[i].duration) {
                    currentStageIdx = i;
                    break;
                }
                dayInStage -= stages[i].duration;
            }

            const stage = stages[currentStageIdx];
            const specific = stage.daily[absDay] || { 
                read: "Repaso y Profundización del Bloque", 
                task: "Consolidar las notas de la semana", 
                social: "Review: Lo aprendido hoy", 
                question: "¿Cómo aplico esto a mi vida?" 
            };

            const date = new Date(2026, 2, 4); // Inicio 4 de Marzo 2026
            date.setDate(date.getDate() + absDay - 1);

            return {
                ...specific,
                stageTitle: stage.title,
                dayInStage,
                stageColor: stage.color,
                stageLightColor: stage.lightColor,
                stageTextColor: stage.textColor,
                stageBorder: stage.border,
                stageIdx: currentStageIdx,
                dateString: date.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' })
            };
        }

        function render() {
            const data = getDayData(selectedDay);
            const root = document.getElementById('root');
            
            root.innerHTML = `
                <div class="p-4 md:p-8 selection:bg-indigo-100">
                    <div class="max-w-6xl mx-auto">
                        
                        <div class="flex flex-wrap justify-center gap-3 mb-8">
                            ${stages.map((s, idx) => {
                                const isActive = data.stageIdx === idx;
                                return `
                                    <button onclick="setStage(${idx})" class="px-6 py-3 rounded-2xl font-bold text-sm transition-all flex items-center gap-2 shadow-sm ${isActive ? s.color + ' text-white scale-105 shadow-md' : 'bg-white text-slate-400 border border-slate-200'}">
                                        <span class="w-5 h-5 flex items-center justify-center rounded-full text-[10px] ${isActive ? 'bg-white/20' : 'bg-slate-100'}">${idx + 1}</span>
                                        <span class="hidden sm:inline">${s.title}</span>
                                    </button>
                                `;
                            }).join('')}
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            
                            <div class="lg:col-span-5 space-y-6">
                                <div class="bg-white rounded-[2rem] p-6 shadow-xl border border-white">
                                    <h2 class="text-xl font-black text-slate-800 mb-6 uppercase tracking-tight">Calendario</h2>
                                    <div class="grid grid-cols-7 gap-2">
                                        ${Array.from({ length: stages[data.stageIdx].duration }).map((_, i) => {
                                            const startDay = stages.slice(0, data.stageIdx).reduce((a, b) => a + b.duration, 0) + 1;
                                            const currentBtnDay = startDay + i;
                                            const isSelected = currentBtnDay === selectedDay;
                                            return `
                                                <button onclick="setDay(${currentBtnDay})" class="aspect-square rounded-2xl text-xs font-black transition-all ${isSelected ? data.stageColor + ' text-white ring-4 ring-offset-2 ' + data.stageBorder.replace('border-', 'ring-') : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}">
                                                    ${i + 1}
                                                </button>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>

                                <div class="bg-indigo-900 rounded-[2rem] p-8 text-white relative overflow-hidden shadow-2xl">
                                    <div class="relative z-10">
                                        <h3 class="text-2xl font-black mb-4 leading-tight">${data.stageTitle}</h3>
                                        <div class="h-3 bg-indigo-950/50 rounded-full overflow-hidden border border-indigo-800/30">
                                            <div class="h-full bg-indigo-400" style="width: ${(data.dayInStage / stages[data.stageIdx].duration) * 100}%"></div>
                                        </div>
                                        <p class="text-xs font-bold mt-2 opacity-70 uppercase tracking-widest">Día ${selectedDay} de 114</p>
                                    </div>
                                </div>
                            </div>

                            <div class="lg:col-span-7 space-y-6">
                                <div class="bg-white rounded-[2rem] p-8 shadow-xl border border-white">
                                    <div class="mb-8">
                                        <h4 class="text-sm font-black uppercase tracking-widest ${data.stageTextColor}">${data.dateString}</h4>
                                        <h1 class="text-4xl font-black text-slate-900">Misión del Día</h1>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                                            <div class="p-2 bg-indigo-100 text-indigo-600 rounded-xl w-fit mb-4"><i data-lucide="book-open"></i></div>
                                            <h5 class="font-black text-slate-800 text-xs mb-1">LECTURA TÉCNICA</h5>
                                            <p class="text-slate-600 font-bold">${data.read}</p>
                                        </div>
                                        <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                                            <div class="p-2 bg-pink-100 text-pink-600 rounded-xl w-fit mb-4"><i data-lucide="camera"></i></div>
                                            <h5 class="font-black text-slate-800 text-xs mb-1">BITÁCORA REDES</h5>
                                            <p class="text-slate-600 font-bold">${data.social}</p>
                                        </div>
                                        <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                                            <div class="p-2 bg-emerald-100 text-emerald-600 rounded-xl w-fit mb-4"><i data-lucide="message-square"></i></div>
                                            <h5 class="font-black text-slate-800 text-xs mb-1">RETO PRÁCTICO</h5>
                                            <p class="text-slate-600 font-bold">${data.task}</p>
                                        </div>
                                        <div class="p-6 bg-slate-900 rounded-3xl border border-slate-800">
                                            <div class="p-2 bg-yellow-500 text-slate-900 rounded-xl w-fit mb-4"><i data-lucide="help-circle"></i></div>
                                            <h5 class="font-black text-white text-xs mb-1 uppercase tracking-widest">Examen de Corazón</h5>
                                            <p class="text-slate-300 font-bold italic">"${data.question}"</p>
                                        </div>
                                    </div>

                                    <div class="flex gap-4 mt-8 pt-6 border-t border-slate-100">
                                        <button onclick="changeDay(-1)" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm hover:bg-slate-200 transition-all">ANTERIOR</button>
                                        <button onclick="changeDay(1)" class="flex-1 py-4 ${data.stageColor} text-white rounded-2xl font-black text-sm shadow-lg shadow-current/30 hover:scale-[1.02] transition-all">SIGUIENTE</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function setDay(d) { selectedDay = d; render(); }
        function changeDay(n) { selectedDay = Math.max(1, Math.min(114, selectedDay + n)); render(); }
        function setStage(idx) {
            const startDay = stages.slice(0, idx).reduce((a, b) => a + b.duration, 0) + 1;
            selectedDay = startDay;
            render();
        }

        render();
    </script>
</body>
</html>
